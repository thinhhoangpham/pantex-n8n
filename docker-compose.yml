services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
    environment:
      - N8N_RESTRICT_FILE_ACCESS_TO=/data
      - N8N_SECURE_COOKIE=false
      - N8N_MCP_ALLOWED_ORIGINS=*
    networks:
      - pmis_net
    restart: unless-stopped

  duckdb-service:
    build: ./duckdb-service
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data
    networks:
      - pmis_net
    restart: unless-stopped

networks:
  pmis_net:
    driver: bridge

volumes:
  n8n_data:
    external: true
